<!DOCTYPE html>
<html>

<head>
<title>Register | Jitu Bhai Coaching</title>
<link rel="stylesheet" href="css/style.css">

<style>

/* FULL PAGE CENTER */

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#002f6c,#0056b3);
}

/* REGISTER CARD */

.register-box{
background:white;
padding:40px;
border-radius:12px;
width:320px;
text-align:center;
box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

/* TITLE */

.register-box h2{
margin-bottom:20px;
color:#002f6c;
}

/* INPUT FIELDS */

.register-box input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
outline:none;
font-size:14px;
}

.register-box input:focus{
border-color:#0056b3;
}

/* BUTTON */

.register-box button{
width:100%;
padding:12px;
background:linear-gradient(45deg,#ff4b2b,#ff416c);
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.register-box button:hover{
transform:scale(1.05);
}

/* LOGIN LINK */

.register-box p{
margin-top:15px;
font-size:14px;
}

.register-box a{
color:#0056b3;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<div class="register-box">

<h2>Create Account</h2>

<input id="name" placeholder="Full Name">

<input id="email" placeholder="Email Address">

<input id="password" type="password" placeholder="Password">

<button onclick="register()">Register</button>

<p>Already have an account? <a href="login.html">Login</a></p>

</div>

<script src="js/script.js"></script>

</body>
</html>
